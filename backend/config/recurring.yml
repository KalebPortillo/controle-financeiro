#   periodic_cleanup:
#     class: CleanSoftDeletedRecordsJob
#     queue: background
#     args: [ 1000, { batch_size: 500 } ]
#     schedule: every hour
#   periodic_cleanup_with_command:
#     command: "SoftDeletedRecord.due.delete_all"
#     priority: 2
#     schedule: at 5am every day

production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
  # RF9.6/RF17: recorrentes atrasadas viram notificação (app é UTC; 11:00 UTC
  # ≈ 08:00 BRT, depois das cobranças da madrugada terem caído).
  check_missed_recurrences:
    class: Notifications::CheckMissedRecurrencesJob
    queue: default
    schedule: at 11am every day

staging:
  check_missed_recurrences:
    class: Notifications::CheckMissedRecurrencesJob
    queue: default
    schedule: at 11am every day
