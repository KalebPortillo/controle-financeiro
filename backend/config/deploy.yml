# Kamal — base config (shared). Destinations herdam daqui e sobrescrevem
# o que muda (host, accessory name, env vars de destination-scope).
#
# Comandos:
#   bin/kamal deploy -d staging
#   bin/kamal deploy -d production

service: controle-financeiro
image: kalebportillo/controle-financeiro

# Single-VPS deploy: ambos destinos rodam na mesma máquina, em containers
# distintos. Kamal proxy roteia por Host header.
servers:
  web:
    - 10.0.0.172

# kamal-proxy expõe porta 80/443 do host e roteia por Host header pros
# containers das apps. Cloudflare termina TLS antes do tunnel; kamal-proxy
# fala plain HTTP com o cloudflared local.
proxy:
  ssl: false
  app_port: 80
  healthcheck:
    path: /up
    interval: 5
    timeout: 30

registry:
  server: ghcr.io
  username: KalebPortillo
  password:
    - KAMAL_REGISTRY_PASSWORD

# Variáveis disponíveis em todos os destinos. Destination-specific (host, dbname)
# vivem em deploy.<destination>.yml.
env:
  secret:
    - RAILS_MASTER_KEY
    - DATABASE_PASSWORD
    - SENTRY_DSN
  clear:
    SOLID_QUEUE_IN_PUMA: true
    DB_PORT: 5432

# Build local (rodando do dev box ARM, é nativo; rodando do GHA x86, usa
# QEMU emulation — slow on first build, layer cache acelera depois).
builder:
  arch: arm64

# SSH user na VPS. portilho precisa estar no docker group (sudo usermod -aG
# docker portilho) para Kamal rodar docker sem sudo.
ssh:
  user: portilho

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

# Storage persistente: ActiveStorage local + qualquer upload. Cada destination
# overrides com volume próprio em deploy.<destination>.yml.
