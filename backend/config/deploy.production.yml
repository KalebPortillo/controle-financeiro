# Kamal — destination "production".

env:
  clear:
    RAILS_ENV: production
    APP_HOST: wallet.portilho.cc
    DB_HOST: controle-financeiro-postgres-production
    DB_USERNAME: controle_financeiro

proxy:
  host: wallet.portilho.cc

volumes:
  - "controle_financeiro_production_storage:/rails/storage"

builder:
  args:
    VITE_SENTRY_DSN: https://3b525cd80caf345ef6a17537d974d054@o4511457451966464.ingest.us.sentry.io/4511457488666625

# Accessory com sufixo do destination — ver explicação em deploy.staging.yml.
accessories:
  postgres-production:
    image: postgres:16-alpine
    host: vps.portilho.cc
    port: "127.0.0.1:5435:5432"
    env:
      clear:
        POSTGRES_USER: controle_financeiro
        POSTGRES_DB: controle_financeiro_production
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data
