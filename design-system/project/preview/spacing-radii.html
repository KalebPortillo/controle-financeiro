<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>Radii — sm/md/lg, no pills</title>
<link rel="stylesheet" href="_preview.css" />
<style></style>
</head>
<body>

<div class="col gap-3">
  <div class="label">vibe linear · radius discreto</div>
  <div class="row" style="gap:28px">
    
      <div class="col" style="gap:6px;align-items:center">
        <div style="width:64px;height:64px;background:var(--muted);border:1px solid var(--border);border-radius:4px"></div>
        <div style="font-size:12px;font-weight:500">sm · 4px</div>
        <div style="font-size:11px;color:var(--muted-foreground)">chips, badges</div>
      </div>
      <div class="col" style="gap:6px;align-items:center">
        <div style="width:64px;height:64px;background:var(--muted);border:1px solid var(--border);border-radius:6px"></div>
        <div style="font-size:12px;font-weight:500">md · 6px</div>
        <div style="font-size:11px;color:var(--muted-foreground)">inputs, buttons (default)</div>
      </div>
      <div class="col" style="gap:6px;align-items:center">
        <div style="width:64px;height:64px;background:var(--muted);border:1px solid var(--border);border-radius:8px"></div>
        <div style="font-size:12px;font-weight:500">lg · 8px</div>
        <div style="font-size:11px;color:var(--muted-foreground)">cards, panels</div>
      </div>
    <div class="col" style="gap:6px;align-items:center;opacity:0.5">
      <div style="width:64px;height:64px;background:var(--muted);border:1px solid var(--border);border-radius:9999px;position:relative">
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--destructive)">✕</div>
      </div>
      <div style="font-size:12px;font-weight:500">pill</div>
      <div style="font-size:11px;color:var(--muted-foreground)">never used</div>
    </div>
  </div>
</div>

</body>
</html>
