<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>Toast & alert</title>
<link rel="stylesheet" href="_preview.css" />
<style></style>
</head>
<body>

<div class="col gap-3">
  <div class="label">sonner toast · sóbrio, sem confete</div>
  <div style="display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px;box-shadow:0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -4px rgba(0,0,0,0.04);width:fit-content">
    <span style="color:var(--success);display:inline-flex"><svg class="icon" viewBox="0 0 24 24" width="16" height="16"><polyline points="20 6 9 17 4 12"/></svg></span>
    <div style="font-size:13px">Gasto consolidado</div>
  </div>
  <div style="display:flex;align-items:flex-start;gap:10px;background:color-mix(in srgb, var(--warning) 8%, transparent);border:1px solid color-mix(in srgb, var(--warning) 30%, transparent);border-radius:8px;padding:12px 14px;max-width:540px">
    <span style="color:var(--warning);margin-top:1px;display:inline-flex"><svg class="icon" viewBox="0 0 24 24" width="16" height="16"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg></span>
    <div style="font-size:13px;line-height:1.45">Alguns gastos aparecem em mais de uma categoria; a soma das categorias pode ser maior que o total real.</div>
  </div>
</div>

</body>
</html>
