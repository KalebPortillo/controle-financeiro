name: deploy

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/test.yml

  deploy-staging:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    environment:
      name: staging
      url: https://wallet-staging.portilho.cc
    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.5
          working-directory: backend
          bundler-cache: true

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Restore master.key
        run: echo "${{ secrets.RAILS_MASTER_KEY }}" > backend/config/master.key

      - name: "Setup SSH — chave em disco + config + teste de conectividade"
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | install -m 600 /dev/stdin ~/.ssh/id_ed25519
          cat >> ~/.ssh/config <<'SSH_CONFIG'
          Host vps.portilho.cc 64.181.161.9
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            LogLevel ERROR
            ServerAliveInterval 30
            ServerAliveCountMax 10
            TCPKeepAlive yes
          SSH_CONFIG
          ssh portilho@vps.portilho.cc echo "SSH OK — pré-voo bem-sucedido"

      - name: "Kamal setup → staging (idempotente — boota proxy + accessories + app)"
        working-directory: backend
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          KAMAL_DB_PASSWORD_STAGING: ${{ secrets.KAMAL_DB_PASSWORD_STAGING }}
          SENTRY_DSN_BACKEND: ${{ secrets.SENTRY_DSN_BACKEND }}
        run: bundle exec kamal setup -d staging

  deploy-production:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 40
    environment:
      name: production
      url: https://wallet.portilho.cc
    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.5
          working-directory: backend
          bundler-cache: true

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Restore master.key
        run: echo "${{ secrets.RAILS_MASTER_KEY }}" > backend/config/master.key

      - name: "Setup SSH — chave em disco + config + teste de conectividade"
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | install -m 600 /dev/stdin ~/.ssh/id_ed25519
          cat >> ~/.ssh/config <<'SSH_CONFIG'
          Host vps.portilho.cc 64.181.161.9
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            LogLevel ERROR
            ServerAliveInterval 30
            ServerAliveCountMax 10
            TCPKeepAlive yes
          SSH_CONFIG
          ssh portilho@vps.portilho.cc echo "SSH OK — pré-voo bem-sucedido"

      - name: "Kamal setup → production (idempotente — boota proxy + accessories + app)"
        working-directory: backend
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          KAMAL_DB_PASSWORD_PRODUCTION: ${{ secrets.KAMAL_DB_PASSWORD_PRODUCTION }}
          SENTRY_DSN_BACKEND: ${{ secrets.SENTRY_DSN_BACKEND }}
        run: bundle exec kamal setup -d production
