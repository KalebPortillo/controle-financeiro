name: deploy

# Build acontece na VPS (builder.remote no kamal): o runner do GHA só
# orquestra. Mas o `docker buildx build --output=type=registry` empurra
# credenciais do CLI (runner) pro buildkit remoto, então o runner PRECISA
# estar logado no ghcr.io — senão o push falha com "denied".
#
# oracle-app-box só é acessível via Tailscale (SSH na internet pública fechado).
# O runner autentica no tailnet via OAuth client antes do SSH.
#
# Secrets necessários no repositório/environment:
#   RAILS_MASTER_KEY             — config/master.key
#   SSH_PRIVATE_KEY              — chave ed25519 autorizada no oracle-app-box
#   TAILSCALE_OAUTH_CLIENT_ID    — OAuth client do tailnet (tag:ci)
#   TAILSCALE_OAUTH_SECRET       — OAuth secret do tailnet (tag:ci)
#   SENTRY_DSN_BACKEND           — DSN Sentry do backend Rails
#   GOOGLE_OAUTH_CLIENT_ID       — RF16, Web client do Google Cloud Console
#   GOOGLE_OAUTH_CLIENT_SECRET   — RF16, idem
#
# Nota: DB password NÃO é secret do GHA — vem do ~/.pgpass do oracle-app-box
# via SSH (ver backend/.kamal/secrets-common).
#
# - push em main → deploy automático em staging
# - tag v*       → deploy em production (com aprovação obrigatória)

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      target:
        description: 'Destino do deploy manual'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  packages: write   # KAMAL_REGISTRY_PASSWORD = GITHUB_TOKEN, precisa pra publicar no GHCR

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/test.yml

  deploy-staging:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: staging
      url: https://wallet-staging.portilho.cc
    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.5
          working-directory: backend
          bundler-cache: true

      - name: Restore master.key
        run: echo "${{ secrets.RAILS_MASTER_KEY }}" > backend/config/master.key

      - name: "Docker login GHCR (buildx remoto precisa das creds do runner)"
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: "Tailscale — autenticar runner no tailnet para acessar oracle-app-box"
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci

      - name: "Setup SSH — hosts/chave/config + teste de conectividade"
        # tailscale-action sobe o tailnet com --accept-dns=false por default,
        # então MagicDNS não resolve "oracle-app-box". Mapeamos manualmente
        # via /etc/hosts apontando para o IP Tailscale fixo (100.68.129.58).
        # Se a máquina for re-tagada e ganhar IP novo, atualizar este map.
        #
        # `User portilho` na config evita que sub-comandos do Kamal usem
        # `runner` (usuário default no GHA runner) — Kamal força via -l,
        # mas alguns sub-paths (kamal-proxy SSH) leem o ~/.ssh/config.
        run: |
          echo "100.68.129.58 oracle-app-box" | sudo tee -a /etc/hosts > /dev/null
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | install -m 600 /dev/stdin ~/.ssh/id_ed25519
          cat >> ~/.ssh/config <<'SSH_CONFIG'
          Host oracle-app-box
            User portilho
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            LogLevel ERROR
            ServerAliveInterval 30
            ServerAliveCountMax 10
            TCPKeepAlive yes
          SSH_CONFIG
          ssh oracle-app-box echo "SSH OK — pré-voo bem-sucedido"

      - name: "Espelhar secrets em ~/.config/controle-financeiro/secrets.env"
        # O .kamal/secrets-common sourceia esse arquivo por var via subshell.
        # Em dev local ele já existe; em CI escrevemos aqui pra unificar o caminho.
        # Sem isso, o KAMAL_REGISTRY_PASSWORD chega vazio no docker login do remoto
        # (Dotenv subshell não enxerga as vars do step env em todos os contextos).
        env:
          KAMAL_REGISTRY_PASSWORD:    ${{ secrets.GITHUB_TOKEN }}
          SENTRY_DSN_BACKEND:         ${{ secrets.SENTRY_DSN_BACKEND }}
          GOOGLE_OAUTH_CLIENT_ID:     ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          PLUGGY_CLIENT_ID:           ${{ secrets.PLUGGY_CLIENT_ID }}
          PLUGGY_CLIENT_SECRET:       ${{ secrets.PLUGGY_CLIENT_SECRET }}
          PLUGGY_WEBHOOK_SECRET:      ${{ secrets.PLUGGY_WEBHOOK_SECRET }}
          GEMINI_API_KEY:             ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN:         ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_WEBHOOK_SECRET:    ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
          TELEGRAM_BOT_USERNAME:      ${{ secrets.TELEGRAM_BOT_USERNAME }}
        run: |
          mkdir -p ~/.config/controle-financeiro
          umask 077
          cat > ~/.config/controle-financeiro/secrets.env <<EOF
          export KAMAL_REGISTRY_PASSWORD='${KAMAL_REGISTRY_PASSWORD}'
          export SENTRY_DSN_BACKEND='${SENTRY_DSN_BACKEND}'
          export GOOGLE_OAUTH_CLIENT_ID='${GOOGLE_OAUTH_CLIENT_ID}'
          export GOOGLE_OAUTH_CLIENT_SECRET='${GOOGLE_OAUTH_CLIENT_SECRET}'
          export PLUGGY_CLIENT_ID='${PLUGGY_CLIENT_ID}'
          export PLUGGY_CLIENT_SECRET='${PLUGGY_CLIENT_SECRET}'
          export PLUGGY_WEBHOOK_SECRET='${PLUGGY_WEBHOOK_SECRET}'
          export GEMINI_API_KEY='${GEMINI_API_KEY}'
          export TELEGRAM_BOT_TOKEN='${TELEGRAM_BOT_TOKEN}'
          export TELEGRAM_WEBHOOK_SECRET='${TELEGRAM_WEBHOOK_SECRET}'
          export TELEGRAM_BOT_USERNAME='${TELEGRAM_BOT_USERNAME}'
          EOF
          chmod 600 ~/.config/controle-financeiro/secrets.env
          # Smoke: confirma que as vars saem do source com tamanho > 0
          set +u
          source ~/.config/controle-financeiro/secrets.env
          echo "KAMAL_REGISTRY_PASSWORD len: ${#KAMAL_REGISTRY_PASSWORD}"
          echo "SENTRY_DSN_BACKEND len:      ${#SENTRY_DSN_BACKEND}"
          echo "GOOGLE_OAUTH_CLIENT_ID len:  ${#GOOGLE_OAUTH_CLIENT_ID}"
          echo "GOOGLE_OAUTH_CLIENT_SECRET len: ${#GOOGLE_OAUTH_CLIENT_SECRET}"

      - name: "Kamal setup → staging (idempotente — boota proxy + app)"
        working-directory: backend
        # As vars são lidas via `~/.config/controle-financeiro/secrets.env`
        # pelo .kamal/secrets-common (espelha o fluxo de dev local).
        run: bundle exec kamal setup -d staging

  deploy-production:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
      url: https://wallet.portilho.cc
    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.5
          working-directory: backend
          bundler-cache: true

      - name: Restore master.key
        run: echo "${{ secrets.RAILS_MASTER_KEY }}" > backend/config/master.key

      - name: "Docker login GHCR (buildx remoto precisa das creds do runner)"
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: "Tailscale — autenticar runner no tailnet para acessar oracle-app-box"
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci

      - name: "Setup SSH — hosts/chave/config + teste de conectividade"
        # tailscale-action sobe o tailnet com --accept-dns=false por default,
        # então MagicDNS não resolve "oracle-app-box". Mapeamos manualmente
        # via /etc/hosts apontando para o IP Tailscale fixo (100.68.129.58).
        # Se a máquina for re-tagada e ganhar IP novo, atualizar este map.
        #
        # `User portilho` na config evita que sub-comandos do Kamal usem
        # `runner` (usuário default no GHA runner) — Kamal força via -l,
        # mas alguns sub-paths (kamal-proxy SSH) leem o ~/.ssh/config.
        run: |
          echo "100.68.129.58 oracle-app-box" | sudo tee -a /etc/hosts > /dev/null
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | install -m 600 /dev/stdin ~/.ssh/id_ed25519
          cat >> ~/.ssh/config <<'SSH_CONFIG'
          Host oracle-app-box
            User portilho
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            LogLevel ERROR
            ServerAliveInterval 30
            ServerAliveCountMax 10
            TCPKeepAlive yes
          SSH_CONFIG
          ssh oracle-app-box echo "SSH OK — pré-voo bem-sucedido"

      - name: "Espelhar secrets em ~/.config/controle-financeiro/secrets.env"
        # O .kamal/secrets-common sourceia esse arquivo por var via subshell.
        # Em dev local ele já existe; em CI escrevemos aqui pra unificar o caminho.
        # Sem isso, o KAMAL_REGISTRY_PASSWORD chega vazio no docker login do remoto
        # (Dotenv subshell não enxerga as vars do step env em todos os contextos).
        env:
          KAMAL_REGISTRY_PASSWORD:    ${{ secrets.GITHUB_TOKEN }}
          SENTRY_DSN_BACKEND:         ${{ secrets.SENTRY_DSN_BACKEND }}
          GOOGLE_OAUTH_CLIENT_ID:     ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          PLUGGY_CLIENT_ID:           ${{ secrets.PLUGGY_CLIENT_ID }}
          PLUGGY_CLIENT_SECRET:       ${{ secrets.PLUGGY_CLIENT_SECRET }}
          PLUGGY_WEBHOOK_SECRET:      ${{ secrets.PLUGGY_WEBHOOK_SECRET }}
          GEMINI_API_KEY:             ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN:         ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_WEBHOOK_SECRET:    ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
