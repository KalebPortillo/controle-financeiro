<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>Tag chips & category</title>
<link rel="stylesheet" href="_preview.css" />
<style></style>
</head>
<body>

<div class="col gap-3">
  <div class="label">tag · plana, livre, múltipla por gasto</div>
  <div class="row gap-2">
    <span class="tag-chip"><span class="dot" style="background:#7C3AED"></span>Mercado</span>
    <span class="tag-chip"><span class="dot" style="background:#B45309"></span>Comida fora</span>
    <span class="tag-chip"><span class="dot" style="background:#15803D"></span>Padaria</span>
    <span class="tag-chip"><span class="dot" style="background:#B91C1C"></span>Urgência</span>
    <span class="tag-chip" style="background:transparent;border:1px dashed var(--border);color:var(--muted-foreground)">+ tag</span>
  </div>
  <div class="row gap-2" style="margin-top:6px;align-items:center">
    <span style="font-size:12px;color:var(--muted-foreground)">categoria:</span>
    <span class="badge badge-outline">Alimentação</span>
    <span style="font-size:12px;color:var(--muted-foreground)">· agrega tags Mercado + Padaria + Comida fora</span>
  </div>
</div>

</body>
</html>
