<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>Display — overview header</title>
<link rel="stylesheet" href="_preview.css" />
<style>
  body { padding: 14px 20px; }
  .specimen {
    font-family: var(--font-display);
    font-weight: 600;
    letter-spacing: -0.025em;
    line-height: 1;
    color: var(--foreground);
  }
  .specimen-xl { font-size: 44px; }
  .specimen-md { font-size: 28px; }
  .glyphs {
    font-family: var(--font-display);
    font-weight: 500;
    color: var(--muted-foreground);
    font-size: 13px;
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>
  <div class="col gap-3">
    <div class="label">display · space grotesk · 600 · -0.025em</div>
    <div class="row" style="align-items:baseline;gap:16px">
      <span class="specimen specimen-xl">R$&nbsp;4.320,00</span>
      <span class="glyphs">↗ +12%</span>
    </div>
    <div class="row" style="align-items:baseline;gap:24px;margin-top:2px">
      <span class="specimen specimen-md">Orçamentos</span>
      <span class="specimen specimen-md" style="color:var(--accent)">2026</span>
    </div>
    <div style="font-size:12px;color:var(--muted-foreground);margin-top:2px">
      usado em overview, hero de relatório e KPIs de impacto
    </div>
  </div>
</body>
</html>
