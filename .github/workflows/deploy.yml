name: deploy

# Build acontece na VPS (builder.remote no kamal): o runner do GHA só
# orquestra. Mas o `docker buildx build --output=type=registry` empurra
# credenciais do CLI (runner) pro buildkit remoto, então o runner PRECISA
# estar logado no ghcr.io — senão o push falha com "denied".
#
# oracle-app-box só é acessível via Tailscale (SSH na internet pública fechado).
# O runner autentica no tailnet via OAuth client antes do SSH.
#
# Secrets necessários no repositório/environment:
#   RAILS_MASTER_KEY             — config/master.key
#   SSH_PRIVATE_KEY              — chave ed25519 autorizada no oracle-app-box
#   TAILSCALE_OAUTH_CLIENT_ID    — OAuth client do tailnet (tag:ci)
#   TAILSCALE_OAUTH_SECRET       — OAuth secret do tailnet (tag:ci)
#   SENTRY_DSN_BACKEND           — DSN Sentry do backend Rails
#   GOOGLE_OAUTH_CLIENT_ID       — RF16, Web client do Google Cloud Console
#   GOOGLE_OAUTH_CLIENT_SECRET   — RF16, idem
#
# Nota: DB password NÃO é secret do GHA — vem do ~/.pgpass do oracle-app-box
# via SSH (ver backend/.kamal/secrets-common).
#
# - push em main → deploy automático em staging
# - tag v*       → deploy em production (com aprovação obrigatória)

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      target:
        description: 'Destino do deploy manual'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  packages: write   # KAMAL_REGISTRY_PASSWORD = GITHUB_TOKEN, precisa pra publicar no GHCR

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/test.yml

  deploy-staging:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: staging
      url: https://wallet-staging.portilho.cc
    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.5
          working-directory: backend
          bundler-cache: true

      - name: Restore master.key
        run: echo "${{ secrets.RAILS_MASTER_KEY }}" > backend/config/master.key

      - name: "Docker login GHCR (buildx remoto precisa das creds do runner)"
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: "Tailscale — autenticar runner no tailnet para acessar oracle-app-box"
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci

      - name: "Setup SSH — hosts/chave/config + teste de conectividade"
        # tailscale-action sobe o tailnet com --accept-dns=false por default,
        # então MagicDNS não resolve "oracle-app-box". Mapeamos manualmente
        # via /etc/hosts apontando para o IP Tailscale fixo (100.68.129.58).
        # Se a máquina for re-tagada e ganhar IP novo, atualizar este map.
        run: |
          echo "100.68.129.58 oracle-app-box" | sudo tee -a /etc/hosts > /dev/null
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | install -m 600 /dev/stdin ~/.ssh/id_ed25519
          cat >> ~/.ssh/config <<'SSH_CONFIG'
          Host oracle-app-box
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            LogLevel ERROR
            ServerAliveInterval 30
            ServerAliveCountMax 10
            TCPKeepAlive yes
          SSH_CONFIG
          ssh portilho@oracle-app-box echo "SSH OK — pré-voo bem-sucedido"

      - name: "Kamal setup → staging (idempotente — boota proxy + app)"
        working-directory: backend
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          SENTRY_DSN_BACKEND: ${{ secrets.SENTRY_DSN_BACKEND }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
        run: bundle exec kamal setup -d staging

  deploy-production:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
      url: https://wallet.portilho.cc
    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.5
          working-directory: backend
          bundler-cache: true

      - name: Restore master.key
        run: echo "${{ secrets.RAILS_MASTER_KEY }}" > backend/config/master.key

      - name: "Docker login GHCR (buildx remoto precisa das creds do runner)"
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: "Tailscale — autenticar runner no tailnet para acessar oracle-app-box"
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci

      - name: "Setup SSH — hosts/chave/config + teste de conectividade"
        # tailscale-action sobe o tailnet com --accept-dns=false por default,
        # então MagicDNS não resolve "oracle-app-box". Mapeamos manualmente
        # via /etc/hosts apontando para o IP Tailscale fixo (100.68.129.58).
        # Se a máquina for re-tagada e ganhar IP novo, atualizar este map.
        run: |
          echo "100.68.129.58 oracle-app-box" | sudo tee -a /etc/hosts > /dev/null
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | install -m 600 /dev/stdin ~/.ssh/id_ed25519
          cat >> ~/.ssh/config <<'SSH_CONFIG'
          Host oracle-app-box
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            LogLevel ERROR
            ServerAliveInterval 30
            ServerAliveCountMax 10
            TCPKeepAlive yes
          SSH_CONFIG
          ssh portilho@oracle-app-box echo "SSH OK — pré-voo bem-sucedido"

      - name: "Kamal setup → production (idempotente — boota proxy + app)"
        working-directory: backend
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          SENTRY_DSN_BACKEND: ${{ secrets.SENTRY_DSN_BACKEND }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
        run: bundle exec kamal setup -d production
