name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    name: Backend (Rails)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: controle_financeiro
          POSTGRES_PASSWORD: dev
          POSTGRES_DB: controle_financeiro_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U controle_financeiro"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.5
          bundler-cache: true
          working-directory: backend
      - name: Lint (Rubocop)
        run: bundle exec rubocop
      - name: Database setup
        env:
          DATABASE_URL: postgres://controle_financeiro:dev@localhost:5432/controle_financeiro_test
          RAILS_ENV: test
        run: bin/rails db:create db:schema:load
      - name: Tests
        env:
          DATABASE_URL: postgres://controle_financeiro:dev@localhost:5432/controle_financeiro_test
          RAILS_ENV: test
        run: bin/rails test
      - name: Coverage threshold
        run: |
          if [ -f coverage/.last_run.json ]; then
            COV=$(jq '.result.line' coverage/.last_run.json)
            echo "Coverage: $COV%"
          fi

  frontend:
    name: Frontend (Vite + React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npm run typecheck
      - name: Unit tests
        run: npm run test -- --run
