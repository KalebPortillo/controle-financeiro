<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>Detail footer actions</title>
<link rel="stylesheet" href="_preview.css" />
<style></style>
</head>
<body>

<div class="col gap-2">
  <div class="label">sheet/dialog · footer fixo · A / R / S hotkeys no desktop</div>
  <div style="border:1px solid var(--border);border-radius:8px;padding:14px 16px;display:flex;gap:8px;justify-content:flex-end;background:var(--muted)">
    <button class="btn btn-ghost">Rejeitar <span style="margin-left:6px;font-size:11px;background:var(--background);border:1px solid var(--border);border-radius:3px;padding:0 4px;font-family:var(--font-mono)">R</span></button>
    <button class="btn btn-ghost">Split <span style="margin-left:6px;font-size:11px;background:var(--background);border:1px solid var(--border);border-radius:3px;padding:0 4px;font-family:var(--font-mono)">S</span></button>
    <button class="btn btn-primary"><svg class="icon" viewBox="0 0 24 24" width="16" height="16"><polyline points="20 6 9 17 4 12"/></svg><span>Aceitar</span><span style="margin-left:6px;font-size:11px;background:rgba(255,255,255,0.18);border-radius:3px;padding:0 4px;font-family:var(--font-mono);color:#fff">A</span></button>
  </div>
</div>

</body>
</html>
