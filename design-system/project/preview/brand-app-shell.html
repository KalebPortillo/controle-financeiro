<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>App shell — desktop chrome</title>
<link rel="stylesheet" href="_preview.css" />
<style></style>
</head>
<body>

<div style="border:1px solid var(--border);border-radius:8px;overflow:hidden;display:grid;grid-template-columns:200px 1fr;height:200px">
  <aside style="background:var(--muted);border-right:1px solid var(--border);padding:12px 8px;display:flex;flex-direction:column;gap:2px">
    <div class="row gap-2" style="padding:6px 8px;margin-bottom:6px">
      <span style="display:inline-flex"><svg class="icon" viewBox="0 0 24 24" width="18" height="18"><path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3a1 1 0 0 0 1-1v-2a8 8 0 0 0-16 0V21a1 1 0 0 0 1 1h13a1 1 0 0 0 1-1v-3"/></svg></span>
      <span style="font-size:13px;font-weight:600">Controle Financeiro</span>
    </div>
    
      <div class="row gap-2" style="padding:6px 8px;font-size:13px;border-radius:6px;background:var(--background);font-weight:500">
        <span style="display:inline-flex;color:var(--foreground)"><svg class="icon" viewBox="0 0 24 24" width="16" height="16"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg></span>
        <span>Inbox</span>
        <span class="badge badge-default" style="margin-left:auto;height:18px;font-size:10px">12</span>
      </div>
      <div class="row gap-2" style="padding:6px 8px;font-size:13px;border-radius:6px;">
        <span style="display:inline-flex;color:var(--muted-foreground)"><svg class="icon" viewBox="0 0 24 24" width="16" height="16"><path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3a1 1 0 0 0 1-1v-2a8 8 0 0 0-16 0V21a1 1 0 0 0 1 1h13a1 1 0 0 0 1-1v-3"/></svg></span>
        <span>Gastos</span>
        
      </div>
      <div class="row gap-2" style="padding:6px 8px;font-size:13px;border-radius:6px;">
        <span style="display:inline-flex;color:var(--muted-foreground)"><svg class="icon" viewBox="0 0 24 24" width="16" height="16"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg></span>
        <span>Orçamentos</span>
        
      </div>
      <div class="row gap-2" style="padding:6px 8px;font-size:13px;border-radius:6px;">
        <span style="display:inline-flex;color:var(--muted-foreground)"><svg class="icon" viewBox="0 0 24 24" width="16" height="16"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg></span>
        <span>Relatórios</span>
        
      </div>
      <div class="row gap-2" style="padding:6px 8px;font-size:13px;border-radius:6px;">
        <span style="display:inline-flex;color:var(--muted-foreground)"><svg class="icon" viewBox="0 0 24 24" width="16" height="16"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg></span>
        <span>Mais</span>
        
      </div>
  </aside>
  <main style="padding:12px 16px;display:flex;flex-direction:column;gap:8px">
    <div class="row" style="justify-content:space-between;align-items:center">
      <div style="font-size:14px;font-weight:600">Inbox</div>
      <div class="row gap-2">
        <span style="font-size:11px;color:var(--muted-foreground);font-family:var(--font-mono);background:var(--muted);border-radius:3px;padding:1px 5px">Cmd K</span>
      </div>
    </div>
    
      <div class="row" style="gap:10px;padding:8px 10px;border:1px solid var(--border);border-radius:6px;align-items:center">
        <div style="width:7px;height:7px;border-radius:50%;background:#15803D"></div>
        <div style="font-size:12px;flex:1">Almoço Padaria</div>
        <div class="cf-money" style="font-size:12px">R$ 28,50</div>
      </div>
      <div class="row" style="gap:10px;padding:8px 10px;border:1px solid var(--border);border-radius:6px;align-items:center">
        <div style="width:7px;height:7px;border-radius:50%;background:#B45309"></div>
        <div style="font-size:12px;flex:1">Uber</div>
        <div class="cf-money" style="font-size:12px">R$ 23,90</div>
      </div>
      <div class="row" style="gap:10px;padding:8px 10px;border:1px solid var(--border);border-radius:6px;align-items:center">
        <div style="width:7px;height:7px;border-radius:50%;background:#A3A3A3"></div>
        <div style="font-size:12px;flex:1">IFOOD*REST</div>
        <div class="cf-money" style="font-size:12px">R$ 62,00</div>
      </div>
  </main>
</div>

</body>
</html>
