<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>Buttons — variants</title>
<link rel="stylesheet" href="_preview.css" />
<style></style>
</head>
<body>

<div class="col gap-3">
  <div class="label">5 variants · default size · radius-md</div>
  <div class="row gap-3">
    <button class="btn btn-primary">Aceitar</button>
    <button class="btn btn-secondary">Rejeitar</button>
    <button class="btn btn-outline">Cancelar</button>
    <button class="btn btn-ghost">Voltar</button>
    <button class="btn btn-destructive">Excluir</button>
  </div>
  <div class="row gap-3" style="margin-top:8px">
    <button class="btn btn-primary"><svg class="icon" viewBox="0 0 24 24" width="16" height="16"><polyline points="20 6 9 17 4 12"/></svg><span>Aceitar</span></button>
    <button class="btn btn-secondary"><svg class="icon" viewBox="0 0 24 24" width="16" height="16"><path d="M16 3h5v5"/><path d="M8 3H3v5"/><path d="m21 3-7 7"/><path d="m3 3 7 7"/><path d="M3 16v5h5"/><path d="m3 21 7-7"/><path d="M16 21h5v-5"/><path d="m14 14 7 7"/></svg><span>Split</span></button>
    <button class="btn btn-icon btn-outline" aria-label="Mais"><svg class="icon" viewBox="0 0 24 24" width="16" height="16"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg></button>
  </div>
</div>
