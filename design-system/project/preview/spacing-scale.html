<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>Spacing — 4px scale (Tailwind)</title>
<link rel="stylesheet" href="_preview.css" />
<style></style>
</head>
<body>

<div class="col gap-3">
  <div class="label">tailwind base · padding cards 16/24px</div>
  <div class="row" style="align-items:flex-end;gap:18px">
    
      <div class="col" style="align-items:center;gap:6px">
        <div style="width:4px;height:4px;background:var(--accent);border-radius:2px"></div>
        <div style="font-size:11px;color:var(--muted-foreground);font-variant-numeric:tabular-nums">4</div>
        <div style="font-size:10px;color:var(--muted-foreground)">space-1</div>
      </div>
      <div class="col" style="align-items:center;gap:6px">
        <div style="width:8px;height:8px;background:var(--accent);border-radius:2px"></div>
        <div style="font-size:11px;color:var(--muted-foreground);font-variant-numeric:tabular-nums">8</div>
        <div style="font-size:10px;color:var(--muted-foreground)">space-2</div>
      </div>
      <div class="col" style="align-items:center;gap:6px">
        <div style="width:12px;height:12px;background:var(--accent);border-radius:2px"></div>
        <div style="font-size:11px;color:var(--muted-foreground);font-variant-numeric:tabular-nums">12</div>
        <div style="font-size:10px;color:var(--muted-foreground)">space-3</div>
      </div>
      <div class="col" style="align-items:center;gap:6px">
        <div style="width:16px;height:16px;background:var(--accent);border-radius:2px"></div>
        <div style="font-size:11px;color:var(--muted-foreground);font-variant-numeric:tabular-nums">16</div>
        <div style="font-size:10px;color:var(--muted-foreground)">space-4</div>
      </div>
      <div class="col" style="align-items:center;gap:6px">
        <div style="width:20px;height:20px;background:var(--accent);border-radius:2px"></div>
        <div style="font-size:11px;color:var(--muted-foreground);font-variant-numeric:tabular-nums">20</div>
        <div style="font-size:10px;color:var(--muted-foreground)">space-5</div>
      </div>
      <div class="col" style="align-items:center;gap:6px">
        <div style="width:24px;height:24px;background:var(--accent);border-radius:2px"></div>
        <div style="font-size:11px;color:var(--muted-foreground);font-variant-numeric:tabular-nums">24</div>
        <div style="font-size:10px;color:var(--muted-foreground)">space-6</div>
      </div>
      <div class="col" style="align-items:center;gap:6px">
        <div style="width:32px;height:32px;background:var(--accent);border-radius:2px"></div>
        <div style="font-size:11px;color:var(--muted-foreground);font-variant-numeric:tabular-nums">32</div>
        <div style="font-size:10px;color:var(--muted-foreground)">space-8</div>
      </div>
      <div class="col" style="align-items:center;gap:6px">
        <div style="width:40px;height:40px;background:var(--accent);border-radius:2px"></div>
        <div style="font-size:11px;color:var(--muted-foreground);font-variant-numeric:tabular-nums">40</div>
        <div style="font-size:10px;color:var(--muted-foreground)">space-10</div>
      </div>
      <div class="col" style="align-items:center;gap:6px">
        <div style="width:48px;height:48px;background:var(--accent);border-radius:2px"></div>
        <div style="font-size:11px;color:var(--muted-foreground);font-variant-numeric:tabular-nums">48</div>
        <div style="font-size:10px;color:var(--muted-foreground)">space-12</div>
      </div>
  </div>
</div>

</html>
