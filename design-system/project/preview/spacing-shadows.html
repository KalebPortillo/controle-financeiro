<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>Elevation — borders, not shadows</title>
<link rel="stylesheet" href="_preview.css" />
<style></style>
</head>
<body>

<div class="col gap-3">
  <div class="label">cards usam borda · sombras apenas em modal/popover</div>
  <div class="row" style="gap:18px">
    <div class="col gap-1" style="align-items:center">
      <div style="width:120px;height:64px;background:var(--background);border:1px solid var(--border);border-radius:8px"></div>
      <div style="font-size:11px;color:var(--muted-foreground)">card · border-only</div>
    </div>
    <div class="col gap-1" style="align-items:center">
      <div style="width:120px;height:64px;background:var(--background);border:1px solid var(--border);border-radius:8px;box-shadow:0 1px 2px 0 rgba(0,0,0,0.04)"></div>
      <div style="font-size:11px;color:var(--muted-foreground)">shadow-sm</div>
    </div>
    <div class="col gap-1" style="align-items:center">
      <div style="width:120px;height:64px;background:var(--background);border:1px solid var(--border);border-radius:8px;box-shadow:0 4px 6px -1px rgba(0,0,0,0.06), 0 2px 4px -2px rgba(0,0,0,0.04)"></div>
      <div style="font-size:11px;color:var(--muted-foreground)">shadow-md · dropdown</div>
    </div>
    <div class="col gap-1" style="align-items:center">
      <div style="width:120px;height:64px;background:var(--background);border:1px solid var(--border);border-radius:8px;box-shadow:0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -4px rgba(0,0,0,0.04)"></div>
      <div style="font-size:11px;color:var(--muted-foreground)">shadow-lg · modal</div>
    </div>
  </div>
</div>

</body>
</html>
