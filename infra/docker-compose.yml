services:
  postgres:
    image: postgres:16-alpine
    container_name: controle-financeiro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: controle_financeiro
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: controle_financeiro_development
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U controle_financeiro -d controle_financeiro_development"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
    name: controle-financeiro-postgres-data
