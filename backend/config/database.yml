# PostgreSQL config for Controle Financeiro.
#
# Dev/Test: Postgres do `infra/docker-compose.yml` (host port 5433).
# Staging/Production: Postgres como Kamal accessory; ENV vars vêm do
# config/deploy.<destination>.yml + .kamal/secrets.
#
# Solid stack (cache, queue, cable) requer DBs separados por env.

default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DB_HOST", "localhost") %>
  port: <%= ENV.fetch("DB_PORT", 5433) %>
  username: <%= ENV.fetch("DB_USERNAME", "controle_financeiro") %>
  password: <%= ENV.fetch("DB_PASSWORD", "dev") %>

development:
  <<: *default
  database: controle_financeiro_development

test:
  <<: *default
  database: controle_financeiro_test

staging:
  primary: &primary_staging
    <<: *default
    database: controle_financeiro_staging
    username: <%= ENV.fetch("DB_USERNAME", "controle_financeiro") %>
    password: <%= ENV["DATABASE_PASSWORD"] %>
    host: <%= ENV["DB_HOST"] %>
    port: <%= ENV.fetch("DB_PORT", 5432) %>
  cache:
    <<: *primary_staging
    database: controle_financeiro_staging_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_staging
    database: controle_financeiro_staging_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_staging
    database: controle_financeiro_staging_cable
    migrations_paths: db/cable_migrate

production:
  primary: &primary_production
    <<: *default
    database: controle_financeiro_production
    username: <%= ENV.fetch("DB_USERNAME", "controle_financeiro") %>
    password: <%= ENV["DATABASE_PASSWORD"] %>
    host: <%= ENV["DB_HOST"] %>
    port: <%= ENV.fetch("DB_PORT", 5432) %>
  cache:
    <<: *primary_production
    database: controle_financeiro_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: controle_financeiro_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: controle_financeiro_production_cable
    migrations_paths: db/cable_migrate
