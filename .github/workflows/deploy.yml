          export GOOGLE_OAUTH_CLIENT_ID='${GOOGLE_OAUTH_CLIENT_ID}'
          export GOOGLE_OAUTH_CLIENT_SECRET='${GOOGLE_OAUTH_CLIENT_SECRET}'
          export PLUGGY_CLIENT_ID='${PLUGGY_CLIENT_ID}'
          export PLUGGY_CLIENT_SECRET='${PLUGGY_CLIENT_SECRET}'
          export PLUGGY_WEBHOOK_SECRET='${PLUGGY_WEBHOOK_SECRET}'
          export GEMINI_API_KEY='${GEMINI_API_KEY}'
          export TELEGRAM_BOT_TOKEN='${TELEGRAM_BOT_TOKEN}'
