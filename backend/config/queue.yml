default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    - queues: "*"
      threads: 3
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 0.1
    # AI suggestion jobs ficam numa queue separada com 1 thread — limita
    # a 1 chamada Gemini por vez, respeitando o free tier (15 RPM).
    - queues: "ai_suggestion"
      threads: 1
      processes: 1
      polling_interval: 5

development:
  <<: *default

test:
  <<: *default

staging:
  <<: *default

production:
  <<: *default
